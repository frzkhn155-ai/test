name: Sunday Cron Test

on:
  workflow_dispatch:          # manual trigger for instant testing
  schedule:
    - cron: '40 12 * * 0'     # 12:40 UTC Sunday = 6:10 PM IST

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Show execution time
        run: |
          echo "UTC time: $(date -u)"
          echo "IST time: $(TZ='Asia/Kolkata' date)"
          echo "Triggered by: ${{ github.event_name }}"
